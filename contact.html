<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | yuyu</title>
<link rel="stylesheet" href="common.css">
<style>
.contact-section {
  background: #fff;
  padding: 72px 48px;
}
.contact-wrap {
  max-width: 580px;
  margin: 0 auto;
}
.contact-wrap h1 {
  font-size: 20px; font-weight: 700;
  color: #1a1a2e; text-align: center; margin-bottom: 40px;
}

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 13px;
  color: #333; margin-bottom: 6px; font-weight: 500;
}
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="url"],
.form-group textarea {
  width: 100%; border: 1px solid #d0d0d0;
  border-radius: 4px; padding: 10px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; color: #1a1a2e;
  background: #fff; outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus,
.form-group textarea:focus { border-color: #3b5cf0; }
.form-group textarea { min-height: 160px; resize: vertical; }

/* Checkboxes */
.check-group { margin-top: 6px; }
.check-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #444; padding: 3px 0; cursor: pointer;
}
.check-label input[type="checkbox"] {
  width: 15px; height: 15px; accent-color: #3b5cf0;
}

/* Placeholder text in textarea */
.form-group textarea::placeholder { color: #aaa; font-size: 13px; }

/* Submit */
.form-submit { text-align: center; margin-top: 28px; }
.btn-submit {
  background: #3b5cf0; color: #fff; border: none;
  padding: 14px 52px; border-radius: 4px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  width: 100%; display: block;
}
.btn-submit:hover { background: #2a45cc; }

.form-notes { margin-top: 20px; }
.form-notes p {
  font-size: 12px; color: #666; line-height: 1.8;
}
.form-notes p::before { content: '・'; }

@media (max-width: 768px) {
  .contact-section { padding: 56px 24px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">yuyu</a>
  <div class="nav-right">
    <a href="index.html">TOP</a>
    <a href="about.html">yuyuについて</a>
    <a href="strengths.html">yuyuの強み</a>
    <a href="services.html">サービス</a>
    <a href="flow.html">制作の流れ</a>
    <a href="contact.html" class="nav-btn active" style="background:#1a1a2e;">お問い合わせ</a>
  <button class="hamburger" onclick="toggleMenu()" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
</div>
</nav>
<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">TOP</a>
    <a href="about.html">yuyuについて</a>
    <a href="strengths.html">yuyuの強み</a>
    <a href="services.html">サービス</a>
    <a href="flow.html">制作の流れ</a>
    <a href="contact.html" class="nav-btn">お問い合わせ</a>
</div>
<script>
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}
</script>

<div style="padding-top:64px;">
<div class="contact-section">
  <div class="contact-wrap fade-up">
    <h1>お問い合わせ</h1>

    <form action="https://formspree.io/f/mwvwbqvp" method="POST">
      <div class="form-group">
        <label>お名前</label>
        <input type="text" placeholder="">
      </div>
      <div class="form-group">
        <label>メール</label>
        <input type="email" placeholder="">
      </div>
      <div class="form-group">
        <label>会社名（任意）</label>
        <input type="text" placeholder="">
      </div>
      <div class="form-group">
        <label>URL（任意）</label>
        <input type="url" placeholder="">
      </div>
      <div class="form-group">
        <label>希望サポート（チェック）</label>
        <div class="check-group">
          <label class="check-label"><input type="checkbox"> 魅力の整理</label>
          <label class="check-label"><input type="checkbox"> SNS運用</label>
          <label class="check-label"><input type="checkbox"> 動画制作</label>
          <label class="check-label"><input type="checkbox"> まだ決まっていない</label>
        </div>
      </div>
      <div class="form-group">
        <label>相談内容（テキストエリア）</label>
        <textarea placeholder="例：店舗（会社）の内容／今困っていること／理想の状態&#10;まだ整理できていなくても大丈夫です。"></textarea>
      </div>

      <div class="form-submit">
        <button type="submit" class="btn-submit">発信設計について相談する</button>
      </div>

      <div class="form-notes">
        <p>返信は原則24〜48時間以内に行います。</p>
        <p>ご相談内容に応じて、最適な進め方をご提案します。</p>
        <p>営業目的の送信はご遠慮ください。</p>
      </div>
    </form>
  </div>
</div>
</div>

<footer>
  <a href="index.html" class="f-logo">yuyu</a>
  <ul>
    <li><a href="about.html">yuyuについて</a></li>
    <li><a href="services.html">サービス</a></li>
    <li><a href="flow.html">制作の流れ</a></li>
    <li><a href="contact.html">お問い合わせ</a></li>
  </ul>
  <p>© 2024 yuyu. All rights reserved.</p>
</footer>

<script>
const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }), {threshold:0.08});
document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
</script>
</body>
</html>
